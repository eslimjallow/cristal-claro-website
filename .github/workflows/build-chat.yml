name: Build chat app
on:
  push:
    branches: [main]
    paths:
      - 'cristal-claro-ai/client/**'
      - '.github/workflows/build-chat.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cristal-claro-ai/client/package-lock.json
      - name: Install and build
        working-directory: cristal-claro-ai/client
        run: npm ci && npm run build
      - name: Commit chat output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild chat app'
          file_pattern: chat/
